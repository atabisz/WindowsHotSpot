name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Publish exe
        run: dotnet publish WindowsHotSpot/WindowsHotSpot.csproj -c Release

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsHotSpot.exe
          path: WindowsHotSpot/bin/Release/net10.0-windows/win-x64/publish/WindowsHotSpot.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: ./build.ps1

      - name: Get version from tag
        id: version
        run: echo "VERSION=$('${{ github.ref_name }}'.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WindowsHotSpot v${{ steps.version.outputs.VERSION }}"
          files: |
            dist/WindowsHotSpot-Setup.exe
            WindowsHotSpot/bin/Release/net10.0-windows/win-x64/publish/WindowsHotSpot.exe
          generate_release_notes: true
